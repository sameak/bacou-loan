name: Production Build

# Triggered manually from GitHub Actions tab when you need a full native build
# (e.g. new native module added, App Store release, version bump).

on:
  workflow_dispatch:
    inputs:
      platform:
        description: Platform to build
        required: true
        default: all
        type: choice
        options:
          - all
          - ios
          - android

jobs:
  build:
    name: EAS Production Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build with EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Start production build
        run: |
          eas build \
            --profile production \
            --platform ${{ github.event.inputs.platform }} \
            --non-interactive
